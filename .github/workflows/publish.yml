name: Publish Python Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package-meta.outputs.version }}
      should_publish: ${{ steps.package-meta.outputs.should_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build setuptools
          python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build distributions
        run: python -m build

      - name: Check release metadata
        id: package-meta
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as f:
              project = tomllib.load(f)["project"]

          name = project["name"]
          version = project["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected_tag = f"v{version}"

          if tag != expected_tag:
              raise SystemExit(
                  f"Git tag {tag!r} does not match project version {version!r}. "
                  f"Expected {expected_tag!r}."
              )

          exists = False

          try:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{name}/json", timeout=30) as resp:
                  data = json.load(resp)
              exists = version in data.get("releases", {})
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          print(f"version={version}")
          print(f"expected_tag={expected_tag}")
          print(f"should_publish={'false' if exists else 'true'}")
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - build
    if: ${{ needs.build.outputs.should_publish == 'true' }}
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/cf-polygon-mcp
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
